document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

hidden;background:#F5F0E6;\">\n  <aside class=\"app-sidebar\" style=\"flex:none;width:248px;background:#EDE6D7;border-right:1px solid #E0D8C6;display:flex;flex-direction:column;height:100vh;\">\n    <div style=\"flex:none;display:flex;align-items:center;gap:10px;padding:18px 18px 14px;\">\n      <div style=\"width:30px;height:30px;border-radius:9px;background:#5E8A6A;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:15px;flex:none;\">✦<\u002Fdiv>\n      <span style=\"font-size:17px;font-weight:700;letter-spacing:-.3px;color:#2E2B24;\">Tend<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex:1;min-height:0;overflow-y:auto;padding:4px 12px 14px;\">\n      <button onclick=\"{{ onToday }}\" style=\"{{ todayNavStyle }}\"><span style=\"{{ todayIconStyle }}\">☀<\u002Fspan><span style=\"font-size:13px;font-weight:600;color:{{ todayTitleColor }};flex:1;text-align:left;\">Today<\u002Fspan><\u002Fbutton>\n      <div style=\"display:flex;align-items:center;gap:8px;margin:18px 6px 9px;\"><span style=\"font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#A09781;flex:none;\">Your agents<\u002Fspan><span style=\"height:1px;flex:1;background:#DFD6C4;\"><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px;\">\n        <sc-for list=\"{{ agentNav }}\" as=\"ag\" hint-placeholder-count=\"5\">\n          <button onclick=\"{{ ag.onClick }}\" style=\"{{ ag.sideStyle }}\">\n            <span style=\"display:flex;align-items:center;gap:10px;width:100%;\">\n              <span style=\"{{ ag.sideIconStyle }}\">{{ ag.glyph }}<\u002Fspan>\n              <span style=\"font-size:13px;font-weight:600;color:{{ ag.nameColor }};flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ ag.name }}<\u002Fspan>\n              <sc-if value=\"{{ ag.count }}\" hint-placeholder-val=\"\"><span style=\"font-size:10px;font-weight:700;color:#fff;background:#C7A25A;border-radius:20px;padding:1px 7px;flex:none;\">{{ ag.count }}<\u002Fspan><\u002Fsc-if>\n            <\u002Fspan>\n            <span style=\"display:flex;align-items:center;gap:6px;padding-left:40px;min-width:0;\">\n              <span style=\"{{ ag.dotStyle }}\"><\u002Fspan>\n              <span style=\"font-size:11px;color:#8A8472;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ ag.handling }}<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;margin:18px 6px 9px;\"><span style=\"font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:#A09781;flex:none;\">Back office<\u002Fspan><span style=\"height:1px;flex:1;background:#DFD6C4;\"><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px;\">\n        <sc-for list=\"{{ wsTop }}\" as=\"w\" hint-placeholder-count=\"6\">\n          <button onclick=\"{{ w.onClick }}\" style=\"{{ w.sideStyle }}\"><span style=\"{{ w.sideIconStyle }}\">{{ w.glyph }}<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;color:{{ w.nameColor }};flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ w.name }}<\u002Fspan><sc-if value=\"{{ w.count }}\" hint-placeholder-val=\"\"><span style=\"font-size:10.5px;font-weight:700;color:#9C9684;flex:none;\">{{ w.count }}<\u002Fspan><\u002Fsc-if><\u002Fbutton>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:none;display:flex;align-items:center;gap:10px;padding:12px 14px;border-top:1px solid #E0D8C6;\">\n      <div style=\"width:34px;height:34px;border-radius:10px;background:#7BA17D;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:13px;flex:none;\">BM<\u002Fdiv>\n      <div style=\"min-width:0;flex:1;\"><div style=\"font-size:12.5px;font-weight:600;color:#2E2B24;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">Brandy Mangum<\u002Fdiv><div style=\"font-size:10.5px;color:#A09781;\">Hartline<\u002Fdiv><\u002Fdiv>\n      <button onclick=\"{{ onSignOut }}\" title=\"Sign out\" style=\"width:30px;height:30px;border-radius:8px;border:1px solid #E0D8C6;background:transparent;color:#9C9684;cursor:pointer;flex:none;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:inherit;\">⏻<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Faside>\n  <div class=\"app-backdrop\" onclick=\"{{ closeNav }}\"><\u002Fdiv>\n  <main class=\"app-main\" style=\"flex:1;min-width:0;display:flex;flex-direction:column;\">\n    <header class=\"app-header app-topbar\" style=\"flex:none;display:flex;align-items:center;gap:14px;padding:17px 28px;background:#EDE6D7;border-bottom:1px solid #E0D8C6;\">\n      <button class=\"app-hamburger\" onclick=\"{{ toggleNav }}\" title=\"Menu\" style=\"width:38px;height:38px;border-radius:10px;border:1px solid #E0D8C6;background:#F7F2E8;color:#6E6857;cursor:pointer;align-items:center;justify-content:center;font-size:17px;flex:none;font-family:inherit;\">☰<\u002Fbutton>\n      <div class=\"topbar-title\" style=\"flex:1;min-width:0;\">\n        <div style=\"display:flex;align-items:center;gap:9px;\"><h1 class=\"h-title\" style=\"margin:0;font-size:20px;font-weight:600;letter-spacing:-.3px;white-space:nowrap;\">{{ headTitle }}<\u002Fh1><sc-if value=\"{{ showLive }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"font-size:11px;color:#5E8A6A;background:#E6EFE6;border:1px solid #D3E2D3;border-radius:20px;padding:2px 9px;white-space:nowrap;\">Live<\u002Fspan><\u002Fsc-if><\u002Fdiv>\n        <p style=\"margin:2px 0 0;font-size:12.5px;color:#857F6E;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ headSub }}<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"app-savedbox\" style=\"flex:none;display:flex;align-items:center;gap:9px;background:#FBF7EF;border:1px solid #E7DFCE;border-radius:12px;padding:8px 13px;\"><span style=\"font-size:16px;font-weight:700;color:#5E8A6A;\">12<\u002Fspan><span style=\"font-size:11px;color:#857F6E;line-height:1.15;\">hours saved<br>this week<\u002Fspan><\u002Fdiv>\n    <\u002Fheader>\n\n    <div class=\"app-scroll\" style=\"flex:1;overflow-y:auto;padding:24px 28px 40px;\">\n     <!-- ════════════════  SCREEN: Today  ════════════════ -->\n     <sc-if value=\"{{ showToday }}\" hint-placeholder-val=\"\">\n      <div data-screen-label=\"Today\" style=\"animation:popin .2s ease;max-width:1480px;\">\n       <div style=\"background:linear-gradient(135deg,#5E8A6A,#7BA17D);border-radius:16px;padding:14px 22px;margin-bottom:18px;color:#fff;\">\n        <div style=\"display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;\"><span style=\"font-size:20px;font-weight:700;letter-spacing:-.3px;\">Good morning, Brandy.<\u002Fspan><span style=\"font-size:12px;opacity:.82;\">{{ todayDate }}<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:12.5px;opacity:.9;margin-top:3px;line-height:1.4;\">Your agents worked overnight — here’s the short list that needs you. Each one’s already drafted; just review &amp; send.<\u002Fdiv>\n       <\u002Fdiv>\n\n       <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:stretch;margin-bottom:24px;\">\n        <div style=\"min-width:0;\">\n         <div style=\"display:flex;align-items:center;gap:9px;margin:0 2px 13px;\"><h2 style=\"margin:0;font-size:14px;font-weight:600;\">What your agents saved you<\u002Fh2><span style=\"margin-left:auto;font-size:11.5px;color:#A39C88;\">This quarter<\u002Fspan><\u002Fdiv>\n         <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:10px;\">\n          <sc-for list=\"{{ roi }}\" as=\"r\" hint-placeholder-count=\"4\">\n           <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:13px;padding:13px 15px;\">\n            <div class=\"lbl\" style=\"font-size:9.5px;color:#857F6E;\">{{ r.label }}<\u002Fdiv>\n            <div style=\"font-size:22px;font-weight:700;letter-spacing:-.5px;margin-top:6px;color:{{ r.color }} 02Fstrong> when signed<\u002Fspan>\n       <\u002Fdiv>\n       <div style=\"display:flex;align-items:center;gap:14px;padding:0 16px 8px;color:#A39C88;font-size:10px;letter-spacing:.06em;text-transform:uppercase;\">\n        <span style=\"width:40px;flex:none;\"><\u002Fspan>\n        <span style=\"flex:1;min-width:0;\">Account<\u002Fspan>\n        <span style=\"width:130px;flex:none;\">Health<\u002Fspan>\n        <span style=\"width:84px;flex:none;text-align:right;\">Annual<\u002Fspan>\n        <span class=\"col-hide-sm\" style=\"width:74px;flex:none;text-align:right;\">Last touch<\u002Fspan>\n        <span class=\"col-hide-sm\" style=\"width:74px;flex:none;text-align:right;\">Renews<\u002Fspan>\n        <span style=\"width:14px;flex:none;\"><\u002Fspan>\n       <\u002Fdiv>\n       <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ queue }}\" as=\"it\" hint-placeholder-count=\"4\">\n          <div style=\"background:#FBF7EF;border:1px solid {{ it.cardBorder }};border-radius:14px;overflow:hidden;\">\n           <button onclick=\"{{ it.onToggle }}\" style=\"width:100%;text-align:left;background:transparent;border:none;cursor:pointer;padding:13px 16px;display:flex;align-items:center;gap:14px;font-family:inherit;\">\n            <span style=\"width:40px;height:40px;border-radius:11px;background:{{ it.avatarBg }};color:{{ it.avatarColor }};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex:none;\">{{ it.initials }}<\u002Fspan>\n            <div style=\"min-width:0;flex:1;\">\n              <div style=\"display:flex;align-items:center;gap:9px;min-width:0;\">\n                <span onclick=\"{{ it.onOpen }}\" style=\"font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;\">{{ it.company }}<\u002Fspan>\n                <span style=\"font-size:10px;color:{{ it.segColor }};background:{{ it.segBg }};border-radius:20px;padding:1px 8px;flex:none;white-spa                 <\u002Fdiv>\n                <div style=\"font-size:12px;color:#6E6857;line-height:1.45;margin-top:8px;\">{{ c.note }}<\u002Fdiv>\n                <div style=\"display:flex;gap:8px;margin-top:10px;align-items:center;flex-wrap:wrap;\">\n                 <sc-if value=\"{{ c.hasNext }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ c.onAdvance }}\" style=\"background:#5E8A6A;color:#fff;border:none;border-radius:9px;padding:7px 13px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;\">{{ c.nextLabel }}<\u002Fbutton><\u002Fsc-if>\n                 <sc-if value=\"{{ c.isHired }}\" hint-placeholder-val=\"\"><button onclick=\"{{ c.onAddToTeam }}\" style=\"background:#3A372E;color:#fff;border:none;border-radius:9px;padding:7px 13px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;\">+ Add to team &amp; onboard<\u002Fbutton><\u002Fsc-if>\n                 <button onclick=\"{{ c.onToggleJourney }}\" style=\"margin-left:auto;background:transparent;border:none;color:#857F6E;font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;padding:6px 4px;\">🕓 {{ c.journeyLabel }} ({{ c.journeyCount }})<\u002Fbutton>\n                <\u002Fdiv>\n                <sc-if value=\"{{ c.journeyOpen }}\" hint-placeholder-val=\"\">\n                 <div style=\"margin-top:11px;padding:12px 13px;background:#F6EFE3;border:1px solid #ECE3D1;border-radius:11px;animation:popin .16s ease;\">\n                  <div class=\"lbl\" style=\"font-size:10px;color:#A39C88;margin-bottom:10px;\">Journey · most recent first<\u002Fdiv>\n                  <div style=\"display:flex;flex-direction:column;\">\n                   <sc-for list=\"{{ c.journey }}\" as=\"j\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;gap:11px;align-items:flex-start;\">\n                     <div style=\"display:flex;flex-direction:column;align-items:center;flex:none;\"><span style=\"width:9px;height:9px;border-radius:50%;background:  ev.time }}<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n         <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"background:#F4E4DA;border:1px solid #E8D2C2;border-radius:16px;padding:15px 16px;\">\n         <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\"><span style=\"width:20px;height:20px;border-radius:6px;background:#C77D54;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;\">⊕<\u002Fspan><h3 style=\"margin:0;font-size:13px;font-weight:600;color:#9A5B38;\">The Hiring agent<\u002Fh3><\u002Fdiv>\n         <p style=\"margin:0;font-size:11.5px;color:#8A6A52;line-height:1.5;\">Ranks every role and candidate by what needs you, drafts the offer when someone’s ready, and moves new hires through onboarding — you approve each step.<\u002Fp>\n        <\u002Fdiv>\n       <\u002Faside>\n      <\u002Fdiv>\n     <\u002Fsc-if>\n\n     <!-- ════════════════  SCREEN: Build Plan  ════════════════ -->\n     <sc-if value=\"{{ showBuild }}\" hint-placeholder-val=\"\">\n      <div data-screen-label=\"Build Plan\" style=\"max-width:940px;margin:0 auto;animation:popin .2s ease;\">\n       <div style=\"display:flex;align-items:flex-start;gap:13px;margin-bottom:8px;\">\n        <div style=\"flex:1;min-width:0;\">\n         <h2 style=\"margin:0;font-size:19px;font-weight:600;letter-spacing:-.3px;\">Build Plan<\u002Fh2>\n         <p style=\"margin:5px 0 0;font-size:13px;color:#857F6E;\">What's working in this prototype, and what it needs to run on real data — for the eng &amp; data review.<\u002Fp>\n        <\u002Fdiv>\n        <span style=\"font-size:10.5px;color:#7B6FA0;background:#EFE7F2;border:1px solid #E0D4E6;border-radius:20px;padding:3px 10px;flex:none;\">Prototype<\u002Fspan>\n       <\u002Fdiv>\n\n       <div style=\"background:#2E4A38;border-radius:16px;padding:18px 20px;margin-top:18px;color:#fff;\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:11px;\"><span style=\"font-size:15px;\">◎<\u002Fspan><h3 style=\"margin:0;font-size:14px;font-weight:700;\">Ideal customer for this dashboard<\u002Fh3><\u002Fdiv>\n        <p style=\"margin:0 0 14px;font-size:13px;line-height:1.55;opacity:.92;\">An <strong>owner-operator who's also the COO<\u002Fstrong> of a B2B services firm that runs on renewable contracts and a lean team — juggling cash, clients, and pipeline with no finance or RevOps function. They’re buried in tabs and spreadsheets and don’t need another dashboard — they need the handful of things that actually need them today surfaced, drafted, and ready to approve, so the business runs without them living inside it.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:9px 16px;margin-bottom:14px;\">\n         <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"color:#A9D0AC;flex:none;\">●<\u002Fspan><span style=\"font-size:12.5px;line-height:1.4;\"><strong>Staffing &amp; recruiting<\u002Fstrong> — placements, CSM book, renewals <span style=\"opacity:.7;\">(modeled here)<\u002Fspan><\u002Fspan><\u002Fdiv>\n         <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"color:#A9D0AC;flex:none;\">●<\u002Fspan><span style=\"font-size:12.5px;line-height:1.4;\"><strong>Managed IT / MSPs<\u002Fstrong> — recurring contracts &amp; account health<\u002Fspan><\u002Fdiv>\n         <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"color:#A9D0AC;flex:none;\">●<\u002Fspan><span style=\"font-size:12.5px;line-height:1.4;\"><strong>Marketing &amp; creative agencies<\u002Fstrong> — retainers &amp; pipeline<\u002Fspan><\u002Fdiv>\n         <div style=\"display:flex;gap:8px;align-items:flex-start;\"><span style=\"color:#A9D0AC;flex:none;\">●<\u002Fspan><span style=\"font-size:12.5px;line-height:1.4;\"><strong>Professional services<\u002Fstrong> — bookkeeping, HR, fractional firms<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:18px;flex-wrap:wrap;border-top:1px solid rgba(255,255,255,.15);padding-top:13px;\">\n         <div><div style=\"font-size:10px;opacity:.7;letter-spacing:.05em;text-transform:uppercase;\">Team size<\u002Fdiv><div style=\"font-size:14px;font-weight:700;margin-top:3px;\">5–50 people<\u002Fdiv><\u002Fdiv>\n         <div><div style=\"font-size:10px;opacity:.7;letter-spacing:.05em;text-transform:uppercase;\">Revenue model<\u002Fdiv><div style=\"font-size:14px;font-weight:700;margin-top:3px;\">Renewable contracts<\u002Fdiv><\u002Fdiv>\n         <div><div style=\"font-size:10px;opacity:.7;letter-spacing:.05em;text-transform:uppercase;\">Back office<\u002Fdiv><div style=\"font-size:14px;font-weight:700;margin-top:3px;\">Owner-run, no RevOps<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n       <\u002Fdiv>\n\n       <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:16px;padding:18px 20px;margin-top:18px;\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"font-size:15px;\">⊟<\u002Fspan><h3 style=\"margin:0;font-size:14px;font-weight:700;\">What it replaces<\u002Fh3><\u002Fdiv>\n        <p style=\"margin:0 0 15px;font-size:12.5px;color:#857F6E;line-height:1.55;\">My honest read: this doesn't rip out your accounting system — it kills the <strong style=\"color:#3A372E;\">tab sprawl and the spreadsheet layer<\u002Fstrong> an owner stitches together to actually run the business. One place, and an agent that does the work instead of just showing it.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px;\">\n         <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:#fff;border:1px solid #ECE3D1;border-radius:11px;\">\n          <span style=\"font-size:11px;font-weight:700;color:#6E8FBE;background:#E9EFF6;border-radius:7px;padding:3px 8px;flex:none;min-width:96px;text-align:center;\">CRM<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;color:#46443C;line-height:1.45;\">Pipeline, leads, follow-up cadence, lead scoring<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:2px;\">replaces HubSpot · Pipedrive · Salesforce starter<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:11.5px;font-weight:700;color:#4F7560;flex:none;white-space:nowrap;\">~$60/mo<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:#fff;border:1px solid #ECE3D1;border-radius:11px;\">\n          <span style=\"font-size:11px;font-weight:700;color:#4F7560;background:#E6EFE6;border-radius:7px;padding:3px 8px;flex:none;min-width:96px;text-align:center;\">Client success<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;color:#46443C;line-height:1.45;\">Account health scores, churn signals, renewals<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:2px;\">replaces ChurnZero · Vitally · Gainsight<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:11.5px;font-weight:700;color:#4F7560;flex:none;white-space:nowrap;\">~$150/mo<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:#fff;border:1px solid #ECE3D1;border-radius:11px;\">\n          <span style=\"font-size:11px;font-weight:700;color:#9A7634;background:#F3EBD8;border-radius:7px;padding:3px 8px;flex:none;min-width:96px;text-align:center;\">Cash flow<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;color:#46443C;line-height:1.45;\">Cash on hand, AR/AP timing, runway, \"can I cover payroll\"<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:2px;\">replaces Float · Fathom · the cash-flow spreadsheet<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:11.5px;font-weight:700;color:#4F7560;flex:none;white-space:nowrap;\">~$60/mo<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:#fff;border:1px solid #ECE3D1;border-radius:11px;\">\n          <span style=\"font-size:11px;font-weight:700;color:#7B6FA0;background:#EFE7F2;border-radius:7px;padding:3px 8px;flex:none;min-width:96px;text-align:center;\">Ops &amp; reporting<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;color:#46443C;line-height:1.45;\">Onboarding tracking, tasks, the weekly leadership rollup<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:2px;\">replaces Asana/Monday boards · BI dashboards · status decks<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:11.5px;font-weight:700;color:#4F7560;flex:none;white-space:nowrap;\">~$80/mo<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:#fff;border:1px solid #ECE3D1;border-radius:11px;\">\n          <span style=\"font-size:11px;font-weight:700;color:#C77D54;background:#F4E4DA;border-radius:7px;padding:3px 8px;flex:none;min-width:96px;text-align:center;\">Hiring / ATS<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;color:#46443C;line-height:1.45;\">Job reqs, candidate pipeline, ratings, onboarding checklists<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:2px;\">replaces Greenhouse · Lever · BambooHR · JazzHR<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:11.5px;font-weight:700;color:#4F7560;flex:none;white-space:nowrap;\">~$120/mo<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:flex;gap:12px;align-items:flex-start;padding:11px 13px;background:#fff;border:1px solid #ECE3D1;border-radius:11px;\">\n          <span style=\"font-size:11px;font-weight:700;color:#9A7CB0;background:#EFE7F2;border-radius:7px;padding:3px 8px;flex:none;min-width:96px;text-align:center;\">Outreach<\u002Fspan>\n          <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;color:#46443C;line-height:1.45;\">Email templates, follow-up sequences, send-and-log<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:2px;\">replaces Mailshake · lemlist · Apollo sequences<\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:11.5px;font-weight:700;color:#4F7560;flex:none;white-space:nowrap;\">~$40/mo<\u002Fspan>\n         <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"background:#2E4A38;border-radius:13px;padding:15px 17px;margin-top:14px;color:#fff;\">\n         <div style=\"display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:11px;\">\n          <span style=\"font-size:11px;opacity:.8;letter-spacing:.05em;text-transform:uppercase;\">Ballpark savings<\u002Fspan>\n          <span style=\"font-size:26px;font-weight:700;letter-spacing:-.5px;\">~$50,000<span style=\"font-size:14px;font-weight:600;opacity:.85;\">/year<\u002Fspan><\u002Fspan>\n          <span style=\"font-size:11.5px;opacity:.8;\">for a 5–50 person firm<\u002Fspan>\n         <\u002Fdiv>\n         <div style=\"display:flex;gap:10px;flex-wrap:wrap;\">\n          <div style=\"flex:1;min-width:150px;background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;\"><div style=\"font-size:11px;opacity:.78;\">Software consolidated<\u002Fdiv><div style=\"font-size:15px;font-weight:700;margin-top:3px;\">~$510/mo · $6–8K/yr<\u002Fdiv><div style=\"font-size:10.5px;opacity:.7;margin-top:2px;\">the 6 tools above · entry tiers, a few seats, 2026 pricing<\u002Fdiv><\u002Fdiv>\n          <div style=\"flex:1;min-width:150px;background:rgba(255,255,255,.08);border-radius:10px;padding:10px 12px;\"><div style=\"font-size:11px;opacity:.78;\">Owner time reclaimed<\u002Fdiv><div style=\"font-size:15px;font-weight:700;margin-top:3px;\">~12 hrs/wk · $36–60K/yr<\u002Fdiv><div style=\"font-size:10.5px;opacity:.7;margin-top:2px;\">5 agents · at a $60–100/hr blended rate<\u002Fdiv><\u002Fdiv>\n         <\u002Fdiv>\n         <p style=\"margin:11px 0 0;font-size:11px;opacity:.72;line-height:1.5;\">Rough estimate — the real prize is the owner's time, not the license fees. Actuals depend on team size, current stack, and what's automated.<\u002Fp>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:9px;align-items:flex-start;margin-top:14px;padding-top:13px;border-top:1px solid #ECE3D1;\">\n         <span style=\"font-size:13px;flex:none;\">↔<\u002Fspan>\n         <p style=\"margin:0;font-size:12px;color:#857F6E;line-height:1.5;\"><strong style=\"color:#3A372E;\">Sits alongside, doesn't replace:<\u002Fstrong> QuickBooks / Xero stay the books of record — this reads from them and turns the numbers into decisions. Same for the email inbox and payroll provider: connected, not replaced.<\u002Fp>\n        <\u002Fdiv>\n       <\u002Fdiv>\n\n       <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:16px;padding:16px 17px;margin-top:18px;\">\n        <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:6px;\"><span style=\"width:22px;height:22px;border-radius:7px;background:#7BA17D;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;\">✉<\u002Fspan><h3 style=\"margin:0;font-size:14px;font-weight:600;\">Connect a sending inbox<\u002Fh3><\u002Fdiv>\n        <p style=\"margin:0 0 12px;font-size:12.5px;color:#857F6E;line-height:1.5;\">Add the address approved drafts should send from. In production this is an OAuth connection; here it sets the identity used across every playbook email.<\u002Fp>\n        <sc-if value=\"{{ emailNotConnected }}\" hint-placeholder-val=\"{{ true }}\">\n         <div style=\"display:flex;gap:8px;flex-wrap:wrap;\">\n          <input value=\"{{ emailDraft }}\" onchange=\"{{ onEmailInput }}\" onkeydown=\"{{ onEmailKey }}\" placeholder=\"you@company.com\" style=\"flex:1;min-width:200px;border:1px solid #E2DAC9;border-radius:10px;padding:10px 12px;font-size:13px;background:#fff;outline:none;color:#4A463C;\">\n          <button onclick=\"{{ onConnectEmail }}\" style=\"background:#5E8A6A;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;flex:none;\">Connect inbox<\u002Fbutton>\n         <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ emailConnected }}\" hint-placeholder-val=\"\">\n         <div style=\"display:flex;align-items:center;gap:11px;background:#E6EFE6;border:1px solid #D3E2D3;border-radius:11px;padding:11px 13px;\">\n          <span style=\"width:20px;height:20px;border-radius:50%;background:#5E8A6A;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;\">✓<\u002Fspan>\n          <div style=\"min-width:0;flex:1;\"><div style=\"font-size:13px;font-weight:600;color:#3A372E;\">Connected<\u002Fdiv><div style=\"font-size:11.5px;color:#5E8A6A;\">Sending drafts as {{ senderEmail }}<\u002Fdiv><\u002Fdiv>\n          <button onclick=\"{{ onDisconnectEmail }}\" style=\"background:transparent;border:none;color:#857F6E;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;text-decoration:underline;flex:none;\">Disconnect<\u002Fbutton>\n         <\u002Fdiv>\n        <\u002Fsc-if>\n       <\u002Fdiv>\n\n       <div style=\"display:flex;align-items:center;gap:8px;margin:22px 2px 12px;\"><span style=\"width:18px;height:18px;border-radius:6px;background:#5E8A6A;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">✓<\u002Fspan><h3 style=\"margin:0;font-size:14px;font-weight:600;\">What's built so far<\u002Fh3><\u002Fdiv>\n       <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ built }}\" as=\"b\" hint-placeholder-count=\"5\">\n         <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:14px;padding:14px 16px;display:flex;gap:12px;align-items:flex-start;\">\n          <span style=\"width:20px;height:20px;border-radius:6px;background:#E6EFE6;color:#5E8A6A;display:flex;align-items:center;justify-content:center;font-size:12px;flex:none;margin-top:1px;\">✓<\u002Fspan>\n          <div style=\"min-width:0;\"><div style=\"font-size:13.5px;font-weight:600;\">{{ b.t }}<\u002Fdiv><div style=\"font-size:12.5px;color:#6E6857;line-height:1.5;margin-top:3px;\">{{ b.d }}<\u002Fdiv><\u002Fdiv>\n         <\u002Fdiv>\n        <\u002Fsc-for>\n       <\u002Fdiv>\n\n       <div style=\"display:flex;align-items:center;gap:8px;margin:24px 2px 12px;\"><span style=\"width:18px;height:18px;border-radius:6px;background:#C49A57;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">→<\u002Fspan><h3 style=\"margin:0;font-size:14px;font-weight:600;\">What's needed to go live<\u002Fh3><\u002Fdiv>\n       <div style=\"display:flex;flex-direction:column;gap:10px;\">\n        <sc-for list=\"{{ todo }}\" as=\"t\" hint-placeholder-count=\"5\">\n         <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:14px;padding:14px 16px;display:flex;gap:13px;align-items:flex-start;\">\n          <span style=\"width:24px;height:24px;border-radius:50%;background:#F3EBD8;color:#9A7634;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none;\">{{ t.n }}<\u002Fspan>\n          <div style=\"min-width:0;flex:1;\"><div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font-size:13.5px;font-weight:600;\">{{ t.t }}<\u002Fspan><span style=\"font-size:10px;color:#857F6E;background:#EDE6D7;border-radius:5px;padding:1px 7px;\">{{ t.tag }}<\u002Fspan><\u002Fdiv><div style=\"font-size:12.5px;color:#6E6857;line-height:1.5;margin-top:3px;\">{{ t.d }}<\u002Fdiv><\u002Fdiv>\n         <\u002Fdiv>\n        <\u002Fsc-for>\n       <\u002Fdiv>\n\n       <div style=\"display:flex;align-items:center;gap:8px;margin:26px 2px 6px;\"><span style=\"width:18px;height:18px;border-radius:6px;background:#6E8FBE;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">↯<\u002Fspan><h3 style=\"margin:0;font-size:14px;font-weight:600;\">How notifications actually work<\u002Fh3><\u002Fdiv>\n       <p style=\"margin:0 0 12px 2px;font-size:12.5px;color:#857F6E;line-height:1.5;max-width:680px;\">When the app pings Slack or sends an email, here's the real plumbing — the same pattern as a live dashboard.<\u002Fp>\n       <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:8px;\">\n        <sc-for list=\"{{ plumbing }}\" as=\"p\" hint-placeholder-count=\"4\">\n         <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:13px;padding:14px 15px;\">\n          <div style=\"width:24px;height:24px;border-radius:7px;background:#EEF2F8;color:#4E6E9E;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;margin-bottom:9px;\">{{ p.step }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;font-weight:600;color:#3A372E;line-height:1.3;\">{{ p.t }}<\u002Fdiv>\n          <div style=\"font-size:11px;color:#857F6E;margin-top:5px;line-height:1.45;\">{{ p.d }}<\u002Fdiv>\n         <\u002Fdiv>\n        <\u002Fsc-for>\n       <\u002Fdiv>\n\n       <div style=\"display:flex;align-items:center;gap:8px;margin:26px 2px 6px;\"><span style=\"width:18px;height:18px;border-radius:6px;background:#7B6FA0;color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;\">◔<\u002Fspan><h3 style=\"margin:0;font-size:14px;font-weight:600;\">What's real vs. mock right now<\u002Fh3><\u002Fdiv>\n       <p style=\"margin:0 0 12px 2px;font-size:12.5px;color:#857F6E;line-height:1.5;max-width:680px;\">Being honest about what's wired today vs. seeded for the demo. <strong style=\"color:#46443C;\">How it works:<\u002Fstrong> the app is a self-contained front-end — data and actions live in the browser. To go live, each mock below swaps for a real source (Sheets/QuickBooks, CRM, email + Slack relays, a database) without changing the UI.<\u002Fp>\n       <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:14px;overflow:hidden;\">\n        <div style=\"display:flex;gap:12px;padding:10px 16px;background:#F6F0E6;border-bottom:1px solid #E7DFCE;font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:#A39C88;\">\n         <span style=\"flex:1.4;min-width:0;\">Feature<\u002Fspan><span style=\"width:130px;flex:none;\">Status<\u002Fspan><span style=\"flex:2;min-width:0;\">Notes<\u002Fspan>\n        <\u002Fdiv>\n        <sc-for list=\"{{ realMock }}\" as=\"rm\" hint-placeholder-count=\"8\">\n         <div style=\"display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid #EFE7D6;align-items:flex-start;\">\n          <span style=\"flex:1.4;min-width:0;font-size:13px;font-weight:600;color:#3A372E;\">{{ rm.feature }}<\u002Fspan>\n          <span style=\"width:130px;flex:none;\"><span style=\"font-size:10.5px;font-weight:600;color:{{ rm.sc }};background:{{ rm.sb }};border-radius:20px;padding:2px 9px;\">{{ rm.status }}<\u002Fspan><\u002Fspan>\n          <span style=\"flex:2;min-width:0;font-size:12px;color:#6E6857;line-height:1.5;\">{{ rm.note }}<\u002Fspan>\n         <\u002Fdiv>\n        <\u002Fsc-for>\n       <\u002Fdiv>\n      <\u002Fdiv>\n     <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fmain>\n\n  <!-- ════════════════  OVERLAY: Account health drawer  ════════════════ -->\n  <sc-if value=\"{{ showDrawer }}\" hint-placeholder-val=\"\">\n   <div style=\"position:fixed;inset:0;z-index:55;display:flex;justify-content:flex-end;\">\n    <div onclick=\"{{ dr.onClose }}\" style=\"position:absolute;inset:0;background:rgba(60,55,46,.34);animation:fadein .18s ease;\"><\u002Fdiv>\n    <div style=\"position:relative;width:min(560px,96vw);height:100%;background:#F5F0E6;box-shadow:-14px 0 44px rgba(60,55,46,.2);display:flex;flex-direction:column;animation:slidein .26s cubic-bezier(.2,.8,.2,1);\">\n\n     <div style=\"flex:none;padding:18px 22px;border-bottom:1px solid #E5DDCC;\">\n      <div style=\"display:flex;align-items:center;gap:12px;\">\n       <span style=\"width:42px;height:42px;border-radius:12px;background:{{ dr.avatarBg }};color:{{ dr.avatarColor }};display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex:none;\">{{ dr.initials }}<\u002Fspan>\n       <div style=\"min-width:0;flex:1;\">\n        <div style=\"display:flex;align-items:center;gap:8px;\">\n         <h2 style=\"margin:0;font-size:17px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\">{{ dr.name }}<\u002Fh2>\n         <span style=\"font-size:10.5px;color:#857F6E;border:1px solid #E2DAC9;border-radius:6px;padding:1px 6px;flex:none;\">{{ dr.vertical }}<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:8px;margin-top:5px;\">\n         <span style=\"font-size:12px;font-weight:700;color:{{ dr.scoreColor }};\">{{ dr.score }}/100<\u002Fspan>\n         <span style=\"font-size:11px;color:{{ dr.scoreColor }};background:{{ dr.levelBg }};border-radius:20px;padding:1px 8px;\">{{ dr.level }}<\u002Fspan>\n        <\u002Fdiv>\n       <\u002Fdiv>\n       <button onclick=\"{{ dr.onClose }}\" style=\"width:32px;height:32px;border-radius:9px;border:1px solid #E2DAC9;background:#fff;color:#857F6E;font-size:16px;cursor:pointer;flex:none;line-height:1;\">×<\u002Fbutton>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:18px;margin-top:14px;flex-wrap:wrap;\">\n       <sc-for list=\"{{ dr.meta }}\" as=\"mt\" hint-placeholder-count=\"5\">\n        <div><div class=\"lbl\" style=\"font-size:10px;color:#A39C88;\">{{ mt.k }}<\u002Fdiv><div style=\"font-size:13px;font-weight:600;margin-top:3px;\">{{ mt.v }}<\u002Fdiv><\u002Fdiv>\n       <\u002Fsc-for>\n      <\u002Fdiv>\n     <\u002Fdiv>\n\n     <div style=\"flex:none;display:flex;gap:4px;padding:10px 16px;background:#EDE6D7;\">\n      <button onclick=\"{{ dr.onTabSignals }}\" style=\"{{ dr.sigTabStyle }}\">Health signals<\u002Fbutton>\n      <button onclick=\"{{ dr.onTabLog }}\" style=\"{{ dr.logTabStyle }}\">Customer log<\u002Fbutton>\n      <button onclick=\"{{ dr.onTabContract }}\" style=\"{{ dr.contractTabStyle }}\">Contract<\u002Fbutton>\n     <\u002Fdiv>\n\n     <div style=\"flex:1;overflow-y:auto;padding:18px 22px 24px;\">\n\n      <sc-if value=\"{{ dr.isSignals }}\" hint-placeholder-val=\"{{ true }}\">\n       <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:6px;\"><span style=\"font-size:13px;font-weight:600;\">Customer health score<\u002Fspan><span style=\"font-size:10.5px;color:#7B6FA0;background:#EFE7F2;border-radius:20px;padding:2px 8px;\">Weighted scorecard<\u002Fspan><\u002Fdiv>\n       <p style=\"margin:0 0 16px;font-size:12px;color:#857F6E;line-height:1.5;\">Built from four categories — onboarding setup, engagement, product usage, and value realized vs. spend. Each is scored and weighted into the overall.<\u002Fp>\n       <div style=\"display:flex;flex-direction:column;gap:14px;\">\n        <sc-for list=\"{{ dr.cats }}\" as=\"c\" hint-placeholder-count=\"4\">\n         <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:14px;overflow:hidden;\">\n          <div style=\"display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #EFE7D6;\">\n           <span style=\"width:24px;height:24px;border-radius:7px;background:{{ c.catColor }};color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex:none;\">{{ c.key }}<\u002Fspan>\n           <div style=\"flex:1;min-width:0;\"><div style=\"font-size:13px;font-weight:600;\">{{ c.name }}<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:1px;\">{{ c.desc }}<\u002Fdiv><\u002Fdiv>\n           <span style=\"font-size:12.5px;font-weight:700;color:{{ c.catColor }};flex:none;\">{{ c.scoreLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:6px 14px 10px;\">\n           <sc-for list=\"{{ c.items }}\" as=\"x\" hint-placeholder-count=\"3\">\n            <div style=\"display:flex;align-items:center;gap:10px;padding:7px 0;\">\n             <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;color:#3A372E;\">{{ x.label }}<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:1px;\">{{ x.note }}<\u002Fdiv><\u002Fdiv>\n             <span style=\"width:64px;height:6px;border-radius:6px;background:#EBE2D0;overflow:hidden;flex:none;\"><span style=\"display:block;height:100%;border-radius:6px;width:{{ x.pct }};background:{{ x.color }};\"><\u002Fspan><\u002Fspan>\n             <span style=\"font-size:11.5px;font-weight:600;color:{{ x.color }};width:34px;text-align:right;flex:none;\">{{ x.valLabel }}<\u002Fspan>\n            <\u002Fdiv>\n           <\u002Fsc-for>\n          <\u002Fdiv>\n         <\u002Fdiv>\n        <\u002Fsc-for>\n       <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ dr.isLog }}\" hint-placeholder-val=\"\">\n       <div style=\"background:#F1ECF4;border:1px solid #E0D4E6;border-radius:12px;padding:12px 14px;margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:9px;\"><span style=\"font-size:11px;font-weight:700;color:#7B6FA0;\">Compose outreach<\u002Fspan><span style=\"font-size:10.5px;color:#A39C88;\">pick a template or write your own — sending logs it below<\u002Fspan><\u002Fdiv>\n        <select value=\"{{ dr.composeTpl }}\" onchange=\"{{ dr.onPickTpl }}\" style=\"width:100%;border:1px solid #E2DAC9;border-radius:9px;padding:9px 11px;font-size:12.5px;background:#fff;outline:none;color:#4A463C;margin-bottom:9px;font-family:inherit;\">\n         <option value=\"\">Start from a template…<\u002Foption>\n         <sc-for list=\"{{ dr.tplOptions }}\" as=\"o\" hint-placeholder-count=\"3\"><option value=\"{{ o.id }}\">{{ o.label }}<\u002Foption><\u002Fsc-for>\n        <\u002Fselect>\n        <input value=\"{{ dr.composeSubject }}\" onchange=\"{{ dr.onComposeSubject }}\" placeholder=\"Subject…\" style=\"width:100%;border:1px solid #E2DAC9;border-radius:9px;padding:9px 11px;font-size:12.5px;background:#fff;outline:none;color:#4A463C;margin-bottom:9px;\">\n        <textarea value=\"{{ dr.composeDraft }}\" onchange=\"{{ dr.onComposeDraft }}\" placeholder=\"Write your message, or pick a template above…\" style=\"width:100%;min-height:118px;border:1px solid #E2DAC9;border-radius:9px;padding:10px 12px;font-size:12.5px;line-height:1.55;background:#fff;outline:none;color:#4A463C;resize:vertical;font-family:inherit;\"><\u002Ftextarea>\n        <button onclick=\"{{ dr.onSendOutreach }}\" style=\"width:100%;margin-top:9px;background:#5E8A6A;color:#fff;border:none;border-radius:9px;padding:10px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;\">Send &amp; log to account<\u002Fbutton>\n       <\u002Fdiv>\n       <p style=\"margin:0 0 14px;font-size:12px;color:#857F6E;\">Shared history, kept on the account so context never leaves with a person.<\u002Fp>\n       <div style=\"display:flex;gap:8px;margin-bottom:14px;\">\n        <input value=\"{{ dr.logNote }}\" onchange=\"{{ dr.onLogNote }}\" placeholder=\"Add a note…\" style=\"flex:1;min-width:0;border:1px solid #E2DAC9;border-radius:10px;padding:9px 11px;font-size:13px;background:#fff;outline:none;color:#4A463C;\">\n        <button onclick=\"{{ dr.onAddNote }}\" style=\"background:#4A463C;color:#fff;border:none;border-radius:10px;padding:9px 14px;font-family:inherit;font-size:12.5px;font-weight:500;cursor:pointer;flex:none;\">+ Add<\u002Fbutton>\n       <\u002Fdiv>\n       <div style=\"background:#EFE7F2;border:1px solid #E0D4E6;border-radius:13px;padding:13px 14px;margin-bottom:16px;\">\n        <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:6px;\"><span style=\"font-size:12px;font-weight:600;color:#7B6FA0;\">✦ Account summary<\u002Fspan><span style=\"font-size:10px;color:#9A8FB8;\">AI<\u002Fspan><\u002Fdiv>\n        <div style=\"font-size:12.5px;color:#4A463C;line-height:1.5;\">{{ dr.summary }}<\u002Fdiv>\n       <\u002Fdiv>\n       <div style=\"display:flex;align-items:center;gap:7px;margin-bottom:8px;\"><span style=\"font-size:12px;font-weight:600;\">Open to-dos from calls<\u002Fspan><span style=\"font-size:10.5px;color:#A39C88;\">· 1 open<\u002Fspan><\u002Fdiv>\n       <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:11px;padding:11px 13px;margin-bottom:16px;display:flex;gap:10px;align-items:flex-start;\">\n        <span style=\"width:16px;height:16px;border-radius:5px;border:1.5px solid #CDC4AE;flex:none;margin-top:1px;\"><\u002Fspan>\n        <span style=\"font-size:12.5px;color:#3A372E;line-height:1.4;\">{{ dr.todo }}<\u002Fspan>\n       <\u002Fdiv>\n       <div style=\"font-size:12px;font-weight:600;margin-bottom:8px;\">History<\u002Fdiv>\n       <div style=\"display:flex;flex-direction:column;gap:10px;margin-bottom:16px;\">\n        <sc-for list=\"{{ dr.history }}\" as=\"h\" hint-placeholder-count=\"2\">\n         <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:12px;padding:11px 13px;\">\n          <div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font-size:13px;color:#857F6E;\">{{ h.glyph }}<\u002Fspan><span style=\"font-size:12.5px;font-weight:600;\">{{ h.label }}<\u002Fspan><span style=\"font-size:10px;color:#7B6FA0;background:#EFE7F2;border-radius:5px;padding:1px 6px;\">{{ h.tag }}<\u002Fspan><span style=\"margin-left:auto;font-size:10.5px;color:#A39C88;\">{{ h.when }}<\u002Fspan><\u002Fdiv>\n          <sc-if value=\"{{ h.subject }}\" hint-placeholder-val=\"\"><div style=\"font-size:11.5px;color:#857F6E;margin-top:5px;\"><span style=\"color:#A39C88;\">Subject:<\u002Fspan> {{ h.subject }}<\u002Fdiv><\u002Fsc-if>\n          <div style=\"font-size:12.5px;color:#4A463C;line-height:1.5;margin-top:6px;white-space:pre-wrap;\">{{ h.body }}<\u002Fdiv>\n         <\u002Fdiv>\n        <\u002Fsc-for>\n       <\u002Fdiv>\n       <div style=\"display:flex;align-items:center;gap:10px;background:#FBF7EF;border:1px solid #E7DFCE;border-radius:11px;padding:11px 13px;\">\n        <div style=\"flex:1;min-width:0;\"><div style=\"font-size:12.5px;font-weight:600;\">CSM override<\u002Fdiv><div style=\"font-size:11px;color:#A39C88;margin-top:1px;\">Override the signal if you know this account is fine.<\u002Fdiv><\u002Fdiv>\n        <span style=\"font-size:12px;color:#857F6E;\">Mark OK<\u002Fspan>\n        <button onclick=\"{{ dr.onMarkOk }}\" style=\"width:34px;height:19px;border-radius:20px;background:{{ dr.markOkBg }};border:none;position:relative;cursor:pointer;flex:none;padding:0;\"><span style=\"position:absolute;top:2px;left:{{ dr.markOkX }};width:15px;height:15px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.2);transition:left .15s;\"><\u002Fspan><\u002Fbutton>\n       <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ dr.isContract }}\" hint-placeholder-val=\"\">\n       <div style=\"background:#FBF7EF;border:1px solid #E7DFCE;border-radius:14px;padding:16px 17px;\">\n        <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:14px;\">\n         <span class=\"lbl\" style=\"font-size:11px;color:#A39C88;\">Contract &amp; account<\u002Fspan>\n         <sc-if value=\"{{ dr.custNotEditing }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ dr.onCustEdit }}\" style=\"margin-left:auto;background:#fff;color:#3A372E;border:1px solid #E2DAC9;border-radius:8px;padding:5px 11px;font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;\">Edit<\u002Fbutton><\u002Fsc-if>\n         <sc-if value=\"{{ dr.custEditing }}\" hint-placeholder-val=\"\"><span style=\"margin-left:auto;font-size:11px;color:#5E8A6A;font-weight:600;\">Editing<\u002Fspan><\u002Fsc-if>\n        <\u002Fdiv>\n        <sc-if value=\"{{ dr.custNotEditing }}\" hint-placeholder-val=\"{{ true }}\">\n         <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:15px 18px;\">\n          <sc-for list=\"{{ dr.contract }}\" as=\"c\" hint-placeholder-count=\"6\">\n           <div><div style=\"font-size:11px;color:#A39C88;\">{{ c.k }}<\u002 h3><button onclick=\"{{ onCloseSnooze }}\" style=\"margin-left:auto;width:28px;height:28px;border-radius:8px;border:1px solid #E2DAC9;background:#fff;color:#857F6E;font-size:15px;cursor:pointer;line-height:1;\">×<\u002Fbutton><\u002Fdiv>\n     <p style=\"margin:0 0 13px;font-size:12px;color:#857F6E;\">It'll drop off your list and resurface on the date you pick.<\u002Fp>\n     <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;\">\n      <sc-for list=\"{{ snoozeOpts }}\" as=\"s\" hint-placeholder-count=\"5\"><button onclick=\"{{ s.onClick }}\" style=\"background:#fff;color:#3A372E;border:1px solid #E2DAC9;border-radius:9px;padding:8px 13px;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;\">{{ s.label }}<\u002Fbutton><\u002Fsc-for>\n     <\u002Fdiv>\n     <div style=\"display:flex;align-items:center;gap:8px;border-top:1px solid #EFE7D6;padding-top:12px;\"><span style=\"font-size:12px;color:#857F6E;white-space:nowrap;\">or pick a date<\u002Fspan><input type=\"date\" onchange=\"{{ onSnoozeModalDate }}\" style=\"flex:1;min-width:0;border:1px solid #E2DAC9;border-radius:9px;padding:8px 10px;font-size:12.5px;background:#fff;color:#4A463C;font-family:inherit;\"><\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ hasToast }}\" hint-placeholder-val=\"\">\n   <div style=\"position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:80;background:#3C372E;color:#F5F0E6;border-radius:12px;padding:12px 18px;font-size:13px;box-shadow:0 12px 32px rgba(60,55,46,.3);display:flex;align-items:center;gap:10px;animation:popin .2s ease;\">\n    <span style=\"width:18px;height:18px;border-radius:6px;background:#7BA17D;display:flex;align-items:center;justify-content:center;color:#fff;font-size:10px;flex:none;\">✦<\u002Fspan>\n    {{ toast }}\n   <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:820}}\">\nclass Component extends DCLogic {\n  state = { ...window.CHA_DATA };\n  // ════════════════  EVENT HANDLERS & ACTIONS (grouped loosely by feature)  ════════════════\n  toggle(id){ this.setState(s=>({expanded:s.expanded===id?null:id})); }\n  toggleNav(){ this.setState(s=>({navOpen:!s.navOpen})); }\n  go(id){ this.setState({active:id,navOpen:false}); }\n  setStatus(id,status){ this.setState(s=>({items:s.items.map(i=>i.id===id?{...i,status}:i)})); }\n  toggleTask(id){ this.setState(s=>({tasks:s.tasks.map(t=>t.id===id?{...t,done:!t.done,meta:!t.done?'Done · just now':'Due today'}:t)})); }\n  addTask(){ const v=(this.state.newTask||'').trim(); if(!v) return; this.setState(s=>({tasks:[...s.tasks,{id:'t'+Date.now(),label:v,meta:'Just added',done:false}],newTask:''})); }\n  toggleWork(cat,id){ this.setState(s=>({worklist:{...s.worklist,[cat]:s.worklist[cat].map(t=>t.id===id?{...t,done:!t.done}:t)}})); }\n  setWorkDraft(cat,v){ this.setState(s=>({worklistDrafts:{...s.worklistDrafts,[cat]:v}})); }\n  addWork(cat){ const v=(this.state.worklistDrafts[cat]||'').trim(); if(!v) return; this.setState(s=>({worklist:{...s.worklist,[cat]:[...s.worklist[cat],{id:cat+Date.now(),label:v,auto:false,done:false}]},worklistDrafts:{...s.worklistDrafts,[cat]:''}})); }\n  addNote(){ const v=(this.state.newNote||'').trim(); if(!v) return; this.setState(s=>({teamNotes:[{id:'tn'+Date.now(),body:v,when:'Just now'},...s.teamNotes],newNote:''})); }\n  selCalDay(d){ this.setState(s=>({calSel:s.calSel===d?null:d})); }\n  selCashCal(key){ this.setState(s=>({cashCalSel:s.cashCalSel===key?null:key})); }\n  closeCalSel(){ this.setState({calSel:null}); }\n  moveCalEvent(fromDay){ this.setState(s=>{const ev=s.calEvents[fromDay]; if(!ev)return{}; const to=Math.min(fromDay+7,30); const ne={...s.calEvents}; delete ne[fromDay]; ne[to]=ev; return {calEvents:ne,calSel:to};}); this.notify('Moved ahead one week'); }\n  setTxField(k,v){ this.setState(s=>({txForm:{...s.txForm,[k]:v}})); }\n  addTx(){ const f=this.state.txForm; const amt=parseInt(String(f.amount).replace(/[^0-9]/g,''),10); if(!f.party.trim()||!amt){this.notify('Add a party and amount');return;}\n    const tx={id:'c'+Date.now(),date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'}),dir:f.dir,party:f.party.trim(),category:f.category,method:f.method,check:f.check,amount:amt,memo:f.memo};\n    this.setState(s=>({cashTx:[tx,...s.cashTx],txForm:{dir:'out',party:'',amount:'',category:'Payroll',catCustom:false,method:'ACH',check:'',memo:''}}));\n    this.notify((f.dir==='in'?'Money in':'Money out')+' logged · $'+amt.toLocaleString(),'action'); }\n  reviewReengagement(acct){ this.openModal({kind:'email',title:'Review re-engagement note',to:(acct.contact||acct.company),playbook:'At-risk re-engagement',subject:'Checking in on '+acct.company,body:\"Hi \"+(acct.contact||'there')+\",\\n\\nIt's been a little quiet on the \"+acct.company+\" account lately and I wanted to reach out personally before anything slips — you've been a valued partner and I'd hate for us to drift.\\n\\nCould we grab 15 minutes this week so I can make sure we're still delivering what you need? I have a few openings Thursday and Friday.\\n\\nWarmly,\\nBrandy\",sendLabel:'Send note',sentMsg:'Re-engagement sent to '+acct.company}); }\n  sendNotice(iv){ this.openModal({kind:'email',title:'Send payment notice',to:iv.client,playbook:'Overdue invoice',subject:'Invoice #'+iv.num+' — friendly reminder',body:\"Hi,\\n\\nA quick reminder that invoice #\"+iv.num+\" for $\"+iv.amount.toLocaleString()+\" is now \"+iv.age+\" days past due. No rush — happy to resend it or answer any questions.\\n\\nThanks so much,\\nBrandy Mangum\",details:[['Invoice','#'+iv.num],['Amount','$'+iv.amount.toLocaleString()],['Age',iv.age+' days']],sendLabel:'Send notice',sentMsg:'Notice sent to '+iv.client,invNum:iv.num}); }\n  exportLedger(){ const rows=[['Date','Direction','Party','Category','Method','Check','Amount','Memo']].concat(this.state.cashTx.map(t=>[t.date,t.dir,t.party,t.category,t.method,t.check||'',t.amount,t.memo||''])); const csv=rows.map(r=>r.map(c=>'\"'+String(c).replace(/\"/g,'\"\"')+'\"').join(',')).join('\\n'); const blob=new Blob([csv],{type:'text/csv'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='cash-log.csv'; a.click(); this.notify('Cash log exported · cash-log.csv','action'); }\n  openTx(id){ this.setState({openTxId:id,txNoteDraft:'',txEdit:false}); }\n  closeTx(){ this.setState({openTxId:null,txEdit:false}); }\n  startTxEdit(){ const t=this.state.cashTx.find(x=>x.id===this.state.openTxId); if(!t)return; this.setState({txEdit:true,txEditForm:{party:t.party,amount:String(t.amount),category:t.category,memo:t.memo||''}}); }\n  cancelTxEdit(){ this.setState({txEdit:false}); }\n  setTxEditField(k,v){ this.setState(s=>({txEditForm:{...s.txEditForm,[k]:v}})); }\n  saveTxEdit(){ const id=this.state.openTxId; const t=this.state.cashTx.find(x=>x.id===id); if(!t)return; const f=this.state.txEditForm;\n    const newAmt=parseInt(String(f.amount).replace(/[^0-9]/g,''),10)||t.amount; const changes=[];\n    if(f.party.trim()&&f.party!==t.party) changes.push({field:'Party',from:t.party,to:f.party.trim()});\n    if(newAmt!==t.amount) changes.push({field:'Amount',from:'$'+t.amount.toLocaleString(),to:'$'+newAmt.toLocaleString()});\n    if(f.category!==t.category) changes.push({field:'Category',from:t.category,to:f.category});\n    if((f.memo||'')!==(t.memo||'')) changes.push({field:'Memo',from:t.memo||'—',to:f.memo||'—'});\n    if(!changes.length){ this.setState({txEdit:false}); return; }\n    const when=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})+', '+new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});\n    const entries=changes.map(c=>({when,by:'Brandy',change:c.field+': '+c.from+' → '+c.to}));\n    this.setState(s=>({cashTx:s.cashTx.map(x=>x.id===id?{...x,party:f.party.trim()||x.party,amount:newAmt,category:f.category,memo:f.memo}:x),\n      txAudit:{...s.txAudit,[id]:[...entries,...(s.txAudit[id]||[])]},txEdit:false}));\n    this.notify(changes.length+' change'+(changes.length>1?'s':'')+' saved · stamped to history','action'); }\n  addTxNote(){ const id=this.state.openTxId; const v=(this.state.txNoteDraft||'').trim(); if(!v)return; this.setState(s=>({txNotes:{...s.txNotes,[id]:[...(s.txNotes[id]||[]),{body:v,when:'Just now'}]},txNoteDraft:''})); this.notify('Note added to transaction'); }\n  openEmpForm(){ this.setState({addEmp:true,empForm:{name:'',role:'',type:'Hourly',rate:'',salary:'',email:''}}); }\n  closeEmpForm(){ this.setState({addEmp:false}); }\n  setEmpField(k,v){ this.setState(s=>({empForm:{...s.empForm,[k]:v}})); }\n  submitEmp(){ const f=this.state.empForm; const name=(f.name||'').trim(); if(!name){this.notify('Add a name');return;}\n    const emp={id:'p'+Date.now(),name,role:(f.role||'Staff').trim(),type:f.type,email:(f.email||'—').trim(),since:'This month'};\n    if(f.type==='Hourly'){emp.hours=80;emp.rate=parseInt(f.rate,10)||20;} else {emp.salary=parseInt(f.salary,10)||2000;}\n    this.setState(s=>({payroll:[...s.payroll,emp],addEmp:false})); this.notify('Added '+name+' to payroll','action'); }\n  openEmp(id){ this.setState({openEmpId:id}); }\n  closeEmp(){ this.setState({openEmpId:null}); }\n  // ──────  HIRING AGENT  ──────\n  hiringAttention(){ const out=[]; const roles=this.state.openRoles||[]; const cands=this.state.candidates||{}; const team=this.state.team||[];\n    roles.forEach(r=>{ (cands[r.id]||[]).forEach(c=>{\n      if(c.stage==='offer') out.push({type:'offer',accent:'#5E8A6A',text:'Send offer to '+c.name,sub:r.title+' · offer drafted & ready',roleId:r.id,candId:c.id});\n      else if(c.stage==='interview'&&c.daysWaiting>=4) out.push({type:'feedback',accent:'#C49A57',text:c.name+' waiting '+c.daysWaiting+'d on your feedback',sub:r.title+' · final interview done',roleId:r.id,candId:c.id});\n    }); });\n    team.forEach(m=>{ if(m.status==='onboarding'&&m.onboarding){ const open=m.onboarding.filter(o=>!o.done).length; if(open>0) out.push({type:'onboard',accent:'#6E8FBE',text:m.name+' starts '+m.start+' — '+open+' onboarding item'+(open>1?'s':'')+' open',sub:'New '+m.role,teamId:m.id}); } });\n    roles.forEach(r=>{ if(r.openedDays>r.target) out.push({type:'role',accent:'#C17A60',text:r.title+' open '+r.openedDays+'d — over your '+r.target+'d target',sub:r.dept+' · '+(((cands[r.id]||[]).length))+' in pipeline',roleId:r.id}); });\n    return out; }\n  stamp(){ const t=new Date(); return 'Jun 21 · '+t.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }\n  pushCandHistory(roleId,candId,extra){ return (s)=>({candidates:{...s.candidates,[roleId]:s.candidates[roleId].map(x=>x.id===candId?{...x,...extra,history:[...(x.history||[]),{label:extra.__log,time:this.stamp()}]}:x)}}); }\n  completePriority(p){ this.setState(s=>({completedToday:[...(s.completedToday||[]),{id:p.id,label:p.doneLabel,tag:p.tagText,time:this.stamp()}]})); if(p.run) p.run(); this.notify('Marked done · added to your completed list','action'); }\n  undoPriority(id){ this.setState(s=>({completedToday:(s.completedToday||[]).filter(x=>x.id!==id)})); }\n  setHiringTab(t){ this.setState({hiringTab:t}); }\n  toggleCandJourney(id){ this.setState(s=>({expandedCand:s.expandedCand===id?null:id})); }\n  openTeam(id){ this.setState({openTeamId:id}); }\n  closeTeam(){ this.setState({openTeamId:null}); }\n  toggleOnboard(teamId,idx){ this.setState(s=>({team:s.team.map(m=>m.id===teamId?{...m,onboarding:m.onboarding.map((o,i)=>i===idx?{...o,done:!o.done}:o)}:m)})); }\n  finishOnboarding(teamId){ const m=this.state.team.find(x=>x.id===teamId); this.setState(s=>({team:s.team.map(x=>x.id===teamId?{...x,status:'active'}:x)})); this.notify((m?m.name:'New hire')+' is fully onboarded — welcome to the team!','action'); }\n  pushTeamHistory(id,log,extra){ this.setState(s=>({team:s.team.map(m=>m.id===id?{...m,...(extra||{}),history:[...(m.history||[]),{label:lo olor=(it,bucket)=>{\n      if(bucket==='prev') return {dot:'#5E8A6A',tag:'#E6EFE6',tagC:'#4F7560',status:'Renewed'};\n      if(it.score<55) return {dot:'#C17A60',tag:'#F3E4DC',tagC:'#A65C42',status:'No response — at risk'};\n      if(it.score<70) return {dot:'#C49A57',tag:'#F3EBD8',tagC:'#9A7634',status:'Follow-up needed'};\n      return {dot:'#5E8A6A',tag:'#E6EFE6',tagC:'#4F7560',status:'On track'};\n    };\n    const buildRenewals=(bucket)=>this.state.items.filter(it=>renewMap[it.id]&&renewMap[it.id].bucket===bucket).map(it=>{\n      const r=renewMap[it.id]; const c=renewColor(it,bucket);\n      return {id:it.id,company:it.company,date:r.date,arrFmt:this.fmtK(it.arr),dot:c.dot,tag:c.tag,tagC:c.tagC,status:c.status,onOpen:()=>this.openDrawer(it.id)};\n    });\n    const renewals={prev:buildRenewals('prev'),current:buildRenewals('current'),next:buildRenewals('next')};\n    const renewCols=[\n      {title:'Last month',month:'May 2026',titleColor:'#857F6E',rows:renewals.prev,count:String(renewals.prev.length),empty:renewals.prev.length===0},\n      {title:'This month',month:'Jun 2026',titleColor:'#3A5340',rows:renewals.current,count:String(renewals.current.length),empty:renewals.current.length===0},\n      {title:'Next month',month:'Jul 2026',titleColor:'#857F6E',rows:renewals.next,count:String(renewals.next.length),empty:renewals.next.length===0},\n    ];\n    const railRiskOf=(it)=> it.score<50?{t:'At risk',c:'#C17A60'}:(it.score<65?{t:'Follow up',c:'#C49A57'}:{t:'On track',c:'#5E8A6A'});\n    const railRenewOrder=[['a3','Jun 12'],['a4','Jun 24'],['a7','Jul 8'],['a8','Jul 16'],['a1','Jul 30']];\n    const railRenewItems=railRenewOrder.map(o=>{const it=this.state.items.find(x=>x.id===o[0]);return it?{it:it,date:o[1]}:null;}).filter(Boolean);\n    const railRenewals=railRenewItems.map(x=>{const rk=railRiskOf(x.it);return {company:x.it.company,date:x.date,arrFmt:this.fmtK(x.it.arr),risk:rk.t,dot:rk.c,onOpen:()=>this.openDrawer(x.it.id)};});\n    const railRenewTotal=this.fmtK(railRenewItems.reduce((s,x)=>s+x.it.arr,0));\n    return {agents,wsNav,showHealth:true,showOther:false,queue,tabs,queueCount:String(this.state.items.length),rollup,feed,watching,tasks,renewCols,railRenewals,railRenewTotal,\n      addCust:this.state.addCust, onOpenCustForm:()=>this.openCustForm(), onCloseCustForm:()=>this.closeCustForm(), onSubmitCust:()=>this.submitCust(),\n      cf:this.state.custForm,\n      onCfCompany:(e)=>this.setCustField('company',e.target.value), onCfVertical:(e)=>this.setCustField('vertical',e.target.value),\n      onCfContact:(e)=>this.setCustField('contact',e.target.value), onCfEmail:(e)=>this.setCustField('email',e.target.value),\n      onCfPhone:(e)=>this.setCustField('phone',e.target.value), onCfArr:(e)=>this.setCustField('arr',e.target.value),\n      onCfSegment:(e)=>this.setCustField('segment',e.target.value), onCfCsm:(e)=>this.setCustField('csm',e.target.value),\n      onCfRenewal:(e)=>this.setCustField('renewal',e.target.value), onCfTerm:(e)=>this.setCustField('term',e.target.value),\n      onCfStartDate:(e)=>this.setCustField('startDate',e.target.value), onCfBilling:(e)=>this.setCustField('billing',e.target.value),\n      onCfContractNum:(e)=>this.setCustField('contractNum',e.target.value),\n      onCfDoc:(e)=>{const fn=(e.target.files&&e.target.files[0])?e.target.files[0].name:''; if(fn)this.setCustField('docName',fn);},\n      taskMeta:doneCount+'/'+this.state.tasks.length+' done',\n      newTask:this.state.newTask,\n      onNewTaskInput:(e)=>this.setState({newTask:e.target.value}),\n      onNewTaskKey:(e)=>{if(e.key==='Enter')this.addTask();},\n      onAddTask:()=>this.addTask(),...overlay};\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Back office.dc"}
